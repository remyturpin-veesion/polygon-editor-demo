<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Fast — Edit detection zone (prototype)</title>
<style>
  :root {
    /* Fast app design tokens (light theme, taken from app screenshots) */
    --bg: #FFFFFF;
    --surface: #F4F4F6;
    --surface-2: #ECEEF2;
    --border: #E5E7EB;
    --text: #1B1F2A;
    --text-2: #4B5563;
    --muted: #6B7280;
    --accent: #2E5FE8;
    --accent-tint: #EAF0FE;
    --danger: #C8242A;
    --danger-tint: #FCE9EA;
    --danger-tint-2: #F8D7D9;
    --warning: #E8A33E;

    /* Editor-specific */
    --vertex: #E8A33E;
    --vertex-selected: #2E5FE8;
    --edge: #2E5FE8;
    --fill: rgba(46, 95, 232, 0.18);
    --halo: rgba(46, 95, 232, 0.20);
    --halo-stroke: rgba(46, 95, 232, 0.55);

    --shadow-sm: 0 1px 2px rgba(20,30,60,0.06);
    --shadow-md: 0 6px 20px rgba(20,30,60,0.10);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #DCDFE6;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Helvetica, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button, input { font-family: inherit; }

  /* ============================================================ */
  /* Form-factor selector (desktop only)                          */
  /* ============================================================ */
  .formfactor {
    position: fixed;
    top: 12px; right: 12px;
    z-index: 100;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
    display: flex; gap: 2px;
    font-size: 12px;
    box-shadow: var(--shadow-sm);
  }
  .formfactor button {
    background: transparent;
    border: 0;
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
  }
  .formfactor button.active {
    background: var(--accent);
    color: white;
  }
  @media (max-width: 720px) {
    .formfactor { display: none; }
  }

  .stage {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(ellipse at top, #ECEFF5 0%, #DCDFE6 60%);
  }

  /* ============================================================ */
  /* PHONE FRAME (desktop preview)                                */
  /* ============================================================ */
  .phone-frame {
    width: 390px; height: 800px;
    background: #1A1A1A;
    border-radius: 44px;
    padding: 10px;
    box-shadow:
      0 30px 80px rgba(20,30,60,0.30),
      0 0 0 1px rgba(0,0,0,0.06);
    position: relative;
  }
  .phone-frame::before {
    content: "";
    position: absolute;
    top: 18px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 28px;
    background: #1A1A1A;
    border-radius: 999px;
    z-index: 5;
  }
  .phone-frame .device {
    width: 100%; height: 100%;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
    background: var(--bg);
  }
  @media (max-width: 720px) {
    .stage { padding: 0; }
    .phone-frame {
      width: 100vw; height: 100vh;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }
    .phone-frame::before { display: none; }
    .phone-frame .device { border-radius: 0; }
  }

  /* ============================================================ */
  /* TABLET / WEB FRAME                                           */
  /* Side-by-side: canvas left, side panel right. */
  /* ============================================================ */
  .tablet-frame {
    width: min(1200px, 95vw);
    height: min(820px, 92vh);
    background: #1A1A1A;
    border-radius: 20px;
    padding: 12px;
    box-shadow:
      0 30px 80px rgba(20,30,60,0.30),
      0 0 0 1px rgba(0,0,0,0.06);
  }
  .tablet-frame .device {
    width: 100%; height: 100%;
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }

  /* ============================================================ */
  /* PHONE LAYOUT                                                 */
  /* ============================================================ */
  .phone-ui {
    display: flex; flex-direction: column;
    height: 100%; width: 100%;
    background: var(--bg);
    padding-top: env(safe-area-inset-top, 0px);
    min-height: 0;
  }
  .phone-ui > .statusbar,
  .phone-ui > .topbar,
  .phone-ui > .fast-button-dock {
    flex-shrink: 0;
  }
  /* Scrollable body — everything between topbar and dock scrolls.
     Dock stays anchored at the bottom; chips/menubar can't get squeezed. */
  .phone-content {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
    /* hide scrollbar like a real native app */
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .phone-content::-webkit-scrollbar { display: none; }

  /* Status bar (fake, just for fidelity) */
  .statusbar {
    height: 44px;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .statusbar .icons { display: flex; gap: 6px; opacity: 0.75; }

  .topbar {
    height: 52px;
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px;
    background: var(--bg);
  }
  .topbar .back {
    width: 36px; height: 36px; border-radius: 50%;
    background: transparent; border: 0; color: var(--text);
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .topbar .title {
    font-size: 18px; font-weight: 700; flex: 1;
    color: var(--text);
  }
  .topbar .save {
    background: var(--accent);
    color: white; border: 0;
    padding: 8px 16px; border-radius: 999px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
  }

  .category-row { padding: 4px 16px 12px; }

  /* Vertical rhythm — every block uses one of these tokens.
     --gap-tight (8px): items in the same group (image / menu / tools)
     --gap-group (20px): between concept groups (tools / zones / commit)
     --gap-section (28px): rare, only between the header block and main content */
  :root {
    --gap-tight: 8px;
    --gap-group: 20px;
    --gap-section: 28px;
  }
  .group-spacer { height: var(--gap-group); flex-shrink: 0; }
  .section-label {
    padding: 0 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .category-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--danger-tint);
    color: var(--danger);
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
  }

  /* Camera card — wraps the screenshot in the Fast pink-tinted frame.
     Aspect ratio matches the source image (704x576 = 11/9) so the image
     fills the card edge-to-edge — no awkward pink bars. */
  .camera-card {
    margin: 0 16px;
    background: transparent;
    border-radius: 0;
    overflow: hidden;
    aspect-ratio: 704 / 576;
    position: relative;
    flex-shrink: 0;
  }
  .camera-card svg.editor {
    display: block;
    width: 100%; height: 100%;
    touch-action: none;
    user-select: none;
  }

  /* Hint card — gesture cheat-sheet above the canvas.
     2×2 grid: each gesture is a self-contained icon+verb+caption cell. */
  .hint-card {
    margin: 0 16px 12px;
    background: var(--accent-tint);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .hint-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 14px;
  }
  .hint-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    min-width: 0;
  }
  .hint-item .hint-ic {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .hint-item .hint-text { min-width: 0; }
  .hint-item .hint-verb {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }
  .hint-item .hint-caption {
    display: block;
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.3;
    margin-top: 1px;
  }


  /* Status row */
  /* Info strip (menubar) — sits 8px below the camera image,
     surfaces live counts and image resolution at a glance.
     Uses unified line-glyph icons (no emoji). */
  .info-strip {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px 0;
    color: var(--text-2);
    font-size: 12.5px;
    overflow-x: auto;
    scrollbar-width: none;
    line-height: 1;
  }
  .info-strip::-webkit-scrollbar { display: none; }
  .info-strip .info-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    line-height: 1;
  }
  .info-strip .info-item .ic {
    color: var(--accent);
    font-size: 13px;
    line-height: 1;
    width: 14px;
    text-align: center;
  }
  .info-strip .info-item b {
    color: var(--text);
    font-weight: 700;
  }
  .info-strip .info-sep {
    width: 1px;
    height: 12px;
    background: var(--border);
    flex-shrink: 0;
  }

  .meta-row {
    display: flex; align-items: center; gap: 8px;
    padding: 0 16px 8px;
    color: var(--muted);
    font-size: 12px;
  }
  .badge {
    display: inline-flex; align-items: center;
    background: var(--surface);
    color: var(--muted);
    padding: 4px 10px; border-radius: 999px;
    font-size: 11.5px;
    border: 1px solid var(--border);
  }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 6px;
  }

  /* Collapsible payload (engineering view) */
  details.payload {
    margin: 4px 16px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    overflow: hidden;
  }
  details.payload > summary {
    cursor: pointer;
    list-style: none;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--muted);
    user-select: none;
  }
  details.payload > summary::after {
    content: "›"; float: right; transition: transform .2s;
    color: var(--muted);
  }
  details.payload[open] > summary::after { transform: rotate(90deg); }
  details.payload pre {
    background: var(--surface);
    color: #2C3340;
    padding: 12px;
    font-size: 11.5px;
    overflow: auto;
    margin: 0;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 160px;
    border-top: 1px solid var(--border);
  }

  /* Bottom tab bar (visual only — for fidelity with Fast app chrome) */
  .tabbar {
    margin-top: auto;
    border-top: 1px solid var(--border);
    background: var(--bg);
    padding: 8px 0 calc(env(safe-area-inset-bottom, 0px) + 6px);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
  }
  .tabbar .tab {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px;
    color: var(--muted);
    font-size: 10.5px;
    font-weight: 500;
  }
  .tabbar .tab.active { color: var(--accent); }
  .tabbar .tab .ic {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  /* FastBanner.error — surface for the contextual "selected point" state.
     Mirrors lib/presentation/shared/widgets/design_system/fast_banner.dart
     with type: FastBannerType.error (lowContrast). */
  .fast-banner-error {
    display: none;
    align-items: center;
    gap: 12px;
    background: var(--danger-tint);    /* lowContrastError.colorContainer */
    border-radius: 12px;               /* FastRadius.small12 */
    padding: 14px 14px;                /* FastSpacings.small16 */
    margin: 0 16px 12px;
  }
  .fast-banner-error.visible { display: flex; }
  .fast-banner-error .icon {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    color: var(--danger);
    flex-shrink: 0;
  }
  .fast-banner-error .copy { flex: 1; min-width: 0; }
  .fast-banner-error .copy .title {
    font-size: 14px;
    font-weight: 700;
    color: var(--danger);              /* error.color */
    line-height: 1.25;
  }
  .fast-banner-error .copy .subtitle {
    font-size: 12.5px;
    color: var(--danger);              /* lowContrastError.onColorContainer */
    opacity: 0.85;
    margin-top: 1px;
  }
  .fast-banner-error .delete {
    flex-shrink: 0;
    background: var(--danger);
    color: white;
    border: 0;
    height: 40px;
    padding: 0 14px;
    border-radius: 8px;                /* FastRadius.small8 (FastButton default) */
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .fast-banner-error .delete:hover { filter: brightness(0.95); }
  /* FastButtonDock — bottom-anchored decision zone.
     Mirrors lib/presentation/shared/widgets/design_system/fast_button_dock.dart */
  .fast-button-dock {
    margin-top: auto;
    background: var(--bg);             /* surfaceContainerLowest */
    padding: 12px 0 calc(env(safe-area-inset-bottom, 0px) + 16px);
    box-shadow: 0 -1px 0 var(--border);
  }
  .fast-button-dock .dock-content {
    padding-top: 0;
  }
  .fast-button-dock .dock-divider {
    display: none;
  }
  .fast-button-dock .dock-buttons {
    display: flex;
    gap: 12px;
    padding: 0 16px;
    justify-content: flex-end;
  }
  .fast-button-dock button.fast-btn {
    height: 44px;
    padding: 0 18px;
    border-radius: 8px;                /* FastRadius.small8 */
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .fast-button-dock button.fast-btn.outlined {
    background: var(--bg);
    color: var(--accent);              /* primary */
    border-color: var(--border);       /* outlineVariant */
  }
  .fast-button-dock button.fast-btn.filled {
    background: var(--accent);
    color: white;
  }
  .fast-button-dock button.fast-btn.filled:disabled {
    background: rgba(27, 31, 42, 0.08);
    color: rgba(27, 31, 42, 0.38);     /* onSurface @ 0.38 (Fast disabled) */
    cursor: not-allowed;
  }
  .fast-button-dock button.fast-btn.filled:hover:not(:disabled) { filter: brightness(0.97); }

  /* Zone selector chips — multi-polygon picker */
  .zones-row {
    display: flex; gap: 8px;
    padding: 0 16px 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .zones-row::-webkit-scrollbar { display: none; }
  .zone-chip {
    flex-shrink: 0;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 6px 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .zone-chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #94A3B8;
    flex-shrink: 0;
  }
  .zone-chip.active {
    background: var(--accent-tint);
    border-color: var(--accent);
    color: var(--accent);
  }
  .zone-chip.active .dot { background: var(--accent); }
  .zone-chip .count {
    color: var(--muted);
    font-weight: 500;
    font-size: 12px;
  }
  .zone-chip.active .count { color: var(--accent); opacity: 0.85; }
  .zone-chip .x {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: 12px;
    margin-left: 2px;
  }
  .zone-chip .x:hover { background: var(--danger-tint); color: var(--danger); }
  .zone-chip.add {
    background: transparent;
    border: 1px dashed var(--accent);
    color: var(--accent);
    padding: 8px 14px;
  }

  /* Vertical zones list (phone): one full-width row per polygon.
     Same horizontal alignment as image / chips / hint (16px gutter). */
  .zones-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 16px;
  }
  .zones-list .zone-chip {
    width: 100%;
    justify-content: flex-start;
    padding: 12px 12px 12px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.2;
  }
  .zones-list .zone-chip .lbl { flex: 0 0 auto; font-weight: 700; }
  .zones-list .zone-chip .count {
    flex: 1 1 auto;
    text-align: right;
    margin-right: 4px;
    font-size: 12.5px;
  }
  .zones-list .zone-chip .x {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  /* + Add zone — tonal secondary button, not a dashed upload box. */
  .zones-list .zone-chip.add {
    justify-content: center;
    padding: 12px 14px;
    background: var(--accent-tint);
    color: var(--accent);
    border: 1px solid transparent;
    font-weight: 700;
  }
  .zones-list .zone-chip.add:hover { background: #DCE6FD; }

  /* Editing chips row — stays above the dock content */
  .chips-row {
    display: flex; gap: 8px;
    padding: 0 16px 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .chips-row::-webkit-scrollbar { display: none; }
  .chips-row.chips-under-image {
    /* Same horizontal margin as the camera-card so the toolbar reads
       as part of the same editing block. 8px gap above (tight). */
    padding: 8px 16px 0;
  }
  .chip {
    flex-shrink: 0;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
  }
  .chip .ic {
    font-size: 15px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .chip.danger {
    background: var(--danger-tint);
    color: var(--danger);
    border-color: var(--danger-tint-2);
  }
  .chip.danger:hover:not(:disabled) { background: var(--danger-tint-2); }
  .chip:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .chip.icon-only {
    width: 44px;
    min-width: 44px;
    height: 44px;
    padding: 0;
    font-size: 19px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
  }

  /* ============================================================ */
  /* TABLET / WEB LAYOUT                                          */
  /* ============================================================ */
  .web-ui {
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: 56px 1fr;
    grid-template-areas:
      "top top"
      "canvas side";
    height: 100%;
    background: var(--bg);
    min-height: 0;
  }
  .web-ui .topbar {
    grid-area: top;
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
  }
  .web-ui .topbar .back {
    width: 36px; height: 36px; border-radius: 50%;
    background: transparent; border: 0; color: var(--text);
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .web-ui .topbar .title { font-size: 16px; font-weight: 700; color: var(--text); }
  .web-ui .topbar .crumb {
    font-size: 13px; color: var(--muted); font-weight: 500;
    margin-left: 8px;
  }
  .web-ui .canvas-wrap {
    grid-area: canvas;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    overflow: hidden;
    position: relative;
    min-width: 0; min-height: 0;
  }
  .web-ui .canvas-card {
    background: transparent;
    overflow: hidden;
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .web-ui .canvas-card svg.editor {
    display: block;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: 704 / 576;
    touch-action: none; user-select: none;
  }
  /* Side panel: holds the same components as phone (hint, menubar,
     chips, zones-list, dock) — single source of truth for the UI. */
  .web-ui .side {
    grid-area: side;
    background: var(--bg);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .web-ui .side .side-content {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    min-height: 0;
    padding: 16px 0 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .web-ui .side .side-content::-webkit-scrollbar { width: 6px; }
  .web-ui .side .side-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  /* Tighten phone-derived components for the side-panel context. */
  .web-ui .side .hint-card,
  .web-ui .side .info-strip,
  .web-ui .side .chips-row,
  .web-ui .side .zones-list { margin-left: 16px; margin-right: 16px; padding-left: 0; padding-right: 0; }
  .web-ui .side .info-strip { padding: 8px 0 0; }
  .web-ui .side .chips-row { padding: 8px 0 0; }
  .web-ui .side .group-spacer { height: var(--gap-group); }
  .web-ui .side .fast-button-dock { flex-shrink: 0; }

  code {
    background: var(--surface);
    padding: 1px 5px; border-radius: 4px;
    font-size: 11.5px;
    color: var(--text);
  }
</style>
</head>
<body>

<div class="formfactor" role="tablist" aria-label="Form factor preview">
  <button id="ff-phone" class="active">📱 Phone</button>
  <button id="ff-tablet">💻 Tablet / Web</button>
</div>

<div class="stage" id="stage"></div>

<!-- ============================================================ -->
<!-- PHONE TEMPLATE                                                -->
<!-- ============================================================ -->
<template id="tpl-phone">
  <div class="phone-ui">
    <div class="statusbar">
      <span>18:55</span>
      <span class="icons">•••• 📶 🔋</span>
    </div>
    <div class="topbar">
      <button class="back" aria-label="Back">‹</button>
      <div class="title">Edit detection zone</div>
      <span style="width:36px;"></span>
    </div>
    <div class="phone-content">
    <div class="category-row">
      <span class="category-pill">📹 Mon petit poney · Cash register</span>
    </div>
    <!-- Gesture cheat-sheet — 2×2 grid, scannable in one glance. -->
    <div class="hint-card" role="group" aria-label="How to edit">
      <div class="hint-grid">
        <div class="hint-item">
          <span class="hint-ic" aria-hidden="true">+</span>
          <span class="hint-text">
            <span class="hint-verb">Tap empty</span>
            <span class="hint-caption">Add a point</span>
          </span>
        </div>
        <div class="hint-item">
          <span class="hint-ic" aria-hidden="true">◉</span>
          <span class="hint-text">
            <span class="hint-verb">Tap a point</span>
            <span class="hint-caption">Select it</span>
          </span>
        </div>
        <div class="hint-item">
          <span class="hint-ic" aria-hidden="true">✥</span>
          <span class="hint-text">
            <span class="hint-verb">Drag inside</span>
            <span class="hint-caption">Move the zone</span>
          </span>
        </div>
        <div class="hint-item">
          <span class="hint-ic" aria-hidden="true">▦</span>
          <span class="hint-text">
            <span class="hint-verb">Tap a grey zone</span>
            <span class="hint-caption">Switch active</span>
          </span>
        </div>
      </div>
    </div>
    <div class="camera-card">
      <svg class="editor" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <!-- Info strip (menubar): live state, line-glyph icons. -->
    <div class="info-strip">
      <span class="info-item">
        <span class="ic">◉</span>
        <span><b data-bind="vcount">0</b> points</span>
      </span>
      <span class="info-sep"></span>
      <span class="info-item">
        <span class="ic">⊞</span>
        <span data-bind="imgsize">— × —</span>
      </span>
      <span class="info-sep"></span>
      <span class="info-item">
        <span class="ic">▦</span>
        <span><b data-bind="zcount">1</b> zone<span data-bind="zplural"></span></span>
      </span>
    </div>
    <div class="chips-row chips-under-image">
      <button class="chip" data-action="rect" title="Seed rectangle" aria-label="Seed rectangle">
        <span class="ic">▭</span><span>Rect</span>
      </button>
      <button class="chip" data-action="undo" title="Undo" aria-label="Undo">
        <span class="ic">↶</span><span>Undo</span>
      </button>
      <button class="chip" data-action="clear" title="Clear zone (empty all points)" aria-label="Clear zone">
        <span class="ic">⌫</span><span>Clear</span>
      </button>
      <button class="chip danger" data-action="delete-selected" data-bind="del-point" title="Delete selected point" aria-label="Delete selected point">
        <span class="ic">🗑</span><span>Delete</span>
      </button>
    </div>
    <div class="group-spacer"></div>
    <div class="zones-list" data-bind="zones"></div>
    </div><!-- /phone-content -->

    <div class="fast-button-dock">
      <div class="dock-divider"></div>
      <div class="dock-buttons">
        <button class="fast-btn outlined" data-action="cancel">Cancel</button>
        <button class="fast-btn filled" data-action="save">Save zones</button>
      </div>
    </div>
  </div>
</template>

<!-- ============================================================ -->
<!-- TABLET / WEB TEMPLATE — canvas left, side-panel right.       -->
<!-- Reuses the same hint / menubar / chips / zones / dock        -->
<!-- components as the phone template (consistent UI everywhere). -->
<!-- ============================================================ -->
<template id="tpl-web">
  <div class="web-ui">
    <div class="topbar">
      <button class="back" aria-label="Back">‹</button>
      <div class="title">Edit detection zone</div>
      <span class="crumb">📹 Mon petit poney · Cash register</span>
    </div>
    <div class="canvas-wrap">
      <div class="canvas-card">
        <svg class="editor" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>
    <aside class="side">
      <div class="side-content">
        <!-- Same gesture cheat-sheet as phone -->
        <div class="hint-card" role="group" aria-label="How to edit">
          <div class="hint-grid">
            <div class="hint-item">
              <span class="hint-ic" aria-hidden="true">+</span>
              <span class="hint-text">
                <span class="hint-verb">Click empty</span>
                <span class="hint-caption">Add a point</span>
              </span>
            </div>
            <div class="hint-item">
              <span class="hint-ic" aria-hidden="true">◉</span>
              <span class="hint-text">
                <span class="hint-verb">Click a point</span>
                <span class="hint-caption">Select it</span>
              </span>
            </div>
            <div class="hint-item">
              <span class="hint-ic" aria-hidden="true">✥</span>
              <span class="hint-text">
                <span class="hint-verb">Drag inside</span>
                <span class="hint-caption">Move the zone</span>
              </span>
            </div>
            <div class="hint-item">
              <span class="hint-ic" aria-hidden="true">▦</span>
              <span class="hint-text">
                <span class="hint-verb">Click a grey zone</span>
                <span class="hint-caption">Switch active</span>
              </span>
            </div>
          </div>
        </div>
        <!-- Same menubar as phone -->
        <div class="info-strip">
          <span class="info-item">
            <span class="ic">◉</span>
            <span><b data-bind="vcount">0</b> points</span>
          </span>
          <span class="info-sep"></span>
          <span class="info-item">
            <span class="ic">⊞</span>
            <span data-bind="imgsize">— × —</span>
          </span>
          <span class="info-sep"></span>
          <span class="info-item">
            <span class="ic">▦</span>
            <span><b data-bind="zcount">1</b> zone<span data-bind="zplural"></span></span>
          </span>
        </div>
        <!-- Same chip toolbar as phone -->
        <div class="chips-row">
          <button class="chip" data-action="rect" title="Seed rectangle" aria-label="Seed rectangle">
            <span class="ic">▭</span><span>Rect</span>
          </button>
          <button class="chip" data-action="undo" title="Undo" aria-label="Undo">
            <span class="ic">↶</span><span>Undo</span>
          </button>
          <button class="chip" data-action="clear" title="Clear zone" aria-label="Clear zone">
            <span class="ic">⌫</span><span>Clear</span>
          </button>
          <button class="chip danger" data-action="delete-selected" data-bind="del-point" title="Delete selected point" aria-label="Delete selected point">
            <span class="ic">🗑</span><span>Delete</span>
          </button>
        </div>
        <!-- Same vertical zones list as phone -->
        <div class="group-spacer"></div>
        <div class="zones-list" data-bind="zones"></div>
      </div>
      <!-- Same dock as phone -->
      <div class="fast-button-dock">
        <div class="dock-buttons">
          <button class="fast-btn outlined" data-action="cancel">Cancel</button>
          <button class="fast-btn filled" data-action="save">Save zones</button>
        </div>
      </div>
    </aside>
  </div>
</template>

// Multi-polygon state:
//   polygons[i] is a list of [x,y] points (image-space pixels).
//   activeIndex is the polygon currently being edited.
//   selectedIndex is the selected vertex *within* the active polygon, or null.
let polygons = [[]];
let activeIndex = 0;
let selectedIndex = null;
const HISTORY = [];
const MAX_HISTORY = 30;
const active = () => polygons[activeIndex];

// ================================================================
// Mount logic
// ================================================================
const stage = document.getElementById('stage');

function mount(formFactor) {
  stage.innerHTML = '';
  const frame = document.createElement('div');
  frame.className = formFactor === 'phone' ? 'phone-frame' : 'tablet-frame';
  const device = document.createElement('div');
  device.className = 'device';
  frame.appendChild(device);
  stage.appendChild(frame);

  // Phone uses tpl-phone (vertical layout). Tablet uses tpl-web (canvas left,
  // side-panel right) — both share the same component vocabulary.
  const tpl = document.getElementById(formFactor === 'phone' ? 'tpl-phone' : 'tpl-web');
  device.appendChild(tpl.content.cloneNode(true));

  bindEditor(device);
}

document.getElementById('ff-phone').onclick = () => setFormFactor('phone');
document.getElementById('ff-tablet').onclick = () => setFormFactor('tablet');
function setFormFactor(ff) {
  document.getElementById('ff-phone').classList.toggle('active', ff === 'phone');
  document.getElementById('ff-tablet').classList.toggle('active', ff === 'tablet');
  mount(ff);
}

// ================================================================
// Editor binder
// ================================================================
function bindEditor(root) {
  const svg = root.querySelector('svg.editor');
  svg.setAttribute('viewBox', `0 0 ${IMG_W} ${IMG_H}`);

  // Real camera screenshot (Suresnes store back-room, 704x576, base64 inlined).
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'image');
  bg.setAttributeNS('http://www.w3.org/1999/xlink', 'href', SCREENSHOT_DATA_URI);
  bg.setAttribute('href', SCREENSHOT_DATA_URI);
  bg.setAttribute('x', '0');
  bg.setAttribute('y', '0');
  bg.setAttribute('width', IMG_W);
  bg.setAttribute('height', IMG_H);
  bg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
  svg.appendChild(bg);

  const polyLayer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  svg.appendChild(polyLayer);

  function bind(name, value) {
    root.querySelectorAll(`[data-bind="${name}"]`).forEach(el => { el.textContent = value; });
  }
  bind('imgsize', `${IMG_W} × ${IMG_H}`);

  function pushHistory() {
    HISTORY.push({
      polygons: JSON.parse(JSON.stringify(polygons)),
      activeIndex,
      selectedIndex,
    });
    if (HISTORY.length > MAX_HISTORY) HISTORY.shift();
  }
  function undo() {
    if (!HISTORY.length) return;
    const prev = HISTORY.pop();
    polygons = prev.polygons;
    activeIndex = Math.min(prev.activeIndex, polygons.length - 1);
    selectedIndex = (prev.selectedIndex != null && prev.selectedIndex < active().length) ? prev.selectedIndex : null;
    render();
  }
  function setSelected(idx) {
    selectedIndex = (idx == null || idx < 0 || idx >= active().length) ? null : idx;
  }
  function deleteSelected() {
    if (selectedIndex == null) return;
    pushHistory();
    active().splice(selectedIndex, 1);
    selectedIndex = null;
    render();
  }
  function setActive(idx) {
    if (idx < 0 || idx >= polygons.length) return;
    activeIndex = idx;
    selectedIndex = null;
  }
  function addZone() {
    pushHistory();
    polygons.push([]);
    activeIndex = polygons.length - 1;
    selectedIndex = null;
    render();
  }
  function deleteZone(idx) {
    if (idx < 0 || idx >= polygons.length) return;
    pushHistory();
    polygons.splice(idx, 1);
    if (polygons.length === 0) polygons.push([]); // keep editor workable
    activeIndex = Math.max(0, Math.min(activeIndex, polygons.length - 1));
    selectedIndex = null;
    render();
  }

  function clientToImage(evt) {
    const pt = svg.createSVGPoint();
    pt.x = evt.clientX; pt.y = evt.clientY;
    const ctm = svg.getScreenCTM().inverse();
    const p = pt.matrixTransform(ctm);
    return [Math.round(p.x), Math.round(p.y)];
  }

  function pointToSegment(p, a, b) {
    const ax = a[0], ay = a[1], bx = b[0], by = b[1];
    const dx = bx - ax, dy = by - ay;
    const len2 = dx*dx + dy*dy || 1;
    let t = ((p[0]-ax)*dx + (p[1]-ay)*dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + t*dx, cy = ay + t*dy;
    return { dist: Math.hypot(p[0]-cx, p[1]-cy), projection: [Math.round(cx), Math.round(cy)] };
  }

  const VERTEX_HIT = 32;
  const EDGE_HIT = 26;

  // Hit tests scoped to the active polygon (editing happens there only).
  function findEdgeHit(p) {
    const poly = active();
    let best = null;
    for (let i = 0; i < poly.length; i++) {
      const a = poly[i], b = poly[(i+1) % poly.length];
      const r = pointToSegment(p, a, b);
      if (r.dist < EDGE_HIT && (!best || r.dist < best.dist)) best = { ...r, edgeIndex: i };
    }
    return best;
  }
  function findVertexHit(p) {
    const poly = active();
    let best = null;
    for (let i = 0; i < poly.length; i++) {
      const v = poly[i];
      const d = Math.hypot(v[0]-p[0], v[1]-p[1]);
      if (d < VERTEX_HIT && (!best || d < best.dist)) best = { index: i, dist: d };
    }
    return best;
  }
  // Find any non-active polygon whose body contains p — used to switch active.
  function findInactivePolygonHit(p) {
    for (let i = 0; i < polygons.length; i++) {
      if (i === activeIndex) continue;
      if (pointInPolygon(p, polygons[i])) return i;
    }
    return -1;
  }

  // Ray casting — point-in-polygon. Used to start a whole-polygon drag.
  function pointInPolygon(p, poly) {
    if (poly.length < 3) return false;
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const [xi, yi] = poly[i], [xj, yj] = poly[j];
      const intersect = ((yi > p[1]) !== (yj > p[1])) &&
        (p[0] < (xj - xi) * (p[1] - yi) / ((yj - yi) || 1e-9) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }
  function polygonCentroid(poly) {
    if (!poly.length) return null;
    let cx = 0, cy = 0;
    for (const [x, y] of poly) { cx += x; cy += y; }
    return [Math.round(cx / poly.length), Math.round(cy / poly.length)];
  }

  function render() {
    polyLayer.innerHTML = '';
    const NS = 'http://www.w3.org/2000/svg';

    // 1) Inactive polygons — muted dashed outlines, no handles.
    polygons.forEach((poly, i) => {
      if (i === activeIndex || poly.length < 2) return;
      const p = document.createElementNS(NS, 'polygon');
      p.setAttribute('points', poly.map(pt => pt.join(',')).join(' '));
      p.setAttribute('fill', 'rgba(148, 163, 184, 0.14)');
      p.setAttribute('stroke', '#94A3B8');
      p.setAttribute('stroke-width', '3');
      p.setAttribute('stroke-dasharray', '8,6');
      p.setAttribute('stroke-linejoin', 'round');
      polyLayer.appendChild(p);
      // small numeric label on the inactive polygon's centroid
      if (poly.length >= 3) {
        const c = polygonCentroid(poly);
        const lbl = document.createElementNS(NS, 'text');
        lbl.setAttribute('x', c[0]); lbl.setAttribute('y', c[1] + 6);
        lbl.setAttribute('text-anchor', 'middle');
        lbl.setAttribute('font-size', '20');
        lbl.setAttribute('font-family', 'sans-serif');
        lbl.setAttribute('font-weight', '700');
        lbl.setAttribute('fill', '#64748B');
        lbl.setAttribute('pointer-events', 'none');
        lbl.textContent = `${i + 1}`;
        polyLayer.appendChild(lbl);
      }
    });

    // 2) Active polygon — full editor styling.
    const poly = active();
    if (poly.length >= 2) {
      const path = document.createElementNS(NS, 'polygon');
      path.setAttribute('points', poly.map(p => p.join(',')).join(' '));
      path.setAttribute('fill', 'rgba(46, 95, 232, 0.18)');
      path.setAttribute('stroke', '#2E5FE8');
      path.setAttribute('stroke-width', '4');
      path.setAttribute('stroke-linejoin', 'round');
      polyLayer.appendChild(path);
    }
    if (poly.length >= 3) {
      const c = polygonCentroid(poly);
      const bg = document.createElementNS(NS, 'circle');
      bg.setAttribute('cx', c[0]); bg.setAttribute('cy', c[1]);
      bg.setAttribute('r', 18);
      bg.setAttribute('fill', 'rgba(255,255,255,0.92)');
      bg.setAttribute('stroke', '#2E5FE8');
      bg.setAttribute('stroke-width', '2');
      polyLayer.appendChild(bg);
      const txt = document.createElementNS(NS, 'text');
      txt.setAttribute('x', c[0]); txt.setAttribute('y', c[1] + 6);
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('font-size', '18');
      txt.setAttribute('font-family', 'sans-serif');
      txt.setAttribute('fill', '#2E5FE8');
      txt.setAttribute('pointer-events', 'none');
      txt.textContent = '✥';
      polyLayer.appendChild(txt);
    }
    poly.forEach((pt, i) => {
      const isSelected = (i === selectedIndex);
      if (isSelected) {
        const halo = document.createElementNS(NS, 'circle');
        halo.setAttribute('cx', pt[0]); halo.setAttribute('cy', pt[1]);
        halo.setAttribute('r', 30);
        halo.setAttribute('fill', 'rgba(46, 95, 232, 0.18)');
        halo.setAttribute('stroke', 'rgba(46, 95, 232, 0.55)');
        halo.setAttribute('stroke-width', '2');
        polyLayer.appendChild(halo);
      }
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx', pt[0]); c.setAttribute('cy', pt[1]);
      c.setAttribute('r', isSelected ? 16 : 14);
      c.setAttribute('fill', isSelected ? '#2E5FE8' : '#E8A33E');
      c.setAttribute('stroke', '#FFFFFF');
      c.setAttribute('stroke-width', '3');
      polyLayer.appendChild(c);
    });

    // 3) Sidebar/dock state.
    const totalPoints = polygons.reduce((n, p) => n + p.length, 0);
    bind('vcount', totalPoints);
    bind('zcount', polygons.length);
    bind('zplural', polygons.length === 1 ? '' : 's');
    const validPolys = polygons.filter(p => p.length >= 3);
    bind('payload', validPolys.length
      ? validPolys
          .map((poly, i) => `Polygon ${i + 1}: ${poly.map(([x, y]) => `${x},${y}`).join(';')}`)
          .join('\n')
      : '(no valid polygons — need at least one zone with ≥ 3 points)');

    renderZoneChips(root);

    // Save validity: at least one polygon must have ≥ 3 points.
    const isSaveable = validPolys.length > 0;
    root.querySelectorAll('[data-action="save"]').forEach(btn => {
      btn.disabled = !isSaveable;
      btn.title = isSaveable ? 'Save polygons' : 'At least one zone with ≥ 3 points is required';
    });

    // Delete-point chip: enabled only when a node is selected.
    root.querySelectorAll('[data-bind="del-point"]').forEach(btn => {
      btn.disabled = (selectedIndex == null);
      btn.title = (selectedIndex == null) ? 'Select a point first' : 'Delete the selected point';
    });
  }

  // Zone chips — one per polygon, plus an "+ Add zone" trailing chip.
  function renderZoneChips(root) {
    const host = root.querySelector('[data-bind="zones"]');
    if (!host) return;
    host.innerHTML = '';
    polygons.forEach((poly, i) => {
      const chip = document.createElement('button');
      chip.className = 'zone-chip' + (i === activeIndex ? ' active' : '');
      chip.dataset.zone = i;
      const incomplete = poly.length > 0 && poly.length < 3;
      chip.innerHTML = `
        <span class="dot"></span>
        <span class="lbl">Zone ${i + 1}</span>
        <span class="count">${poly.length} pts${incomplete ? ' · incomplete' : ''}</span>
        <span class="x" data-zone-delete="${i}" aria-label="Delete zone ${i + 1}">✕</span>
      `;
      host.appendChild(chip);
    });
    const add = document.createElement('button');
    add.className = 'zone-chip add';
    add.dataset.action = 'add-zone';
    add.textContent = '+ Add zone';
    host.appendChild(add);
  }

  // dragging: { kind: 'vertex', index } | { kind: 'polygon', start, snapshot }
  let dragging = null;

  svg.addEventListener('pointerdown', (evt) => {
    evt.preventDefault();
    svg.setPointerCapture(evt.pointerId);
    const p = clientToImage(evt);

    // 1) Vertex hit (active polygon) → select & drag the vertex.
    const v = findVertexHit(p);
    if (v) {
      pushHistory();
      setSelected(v.index);
      dragging = { kind: 'vertex', index: v.index };
      render();
      return;
    }

    // 2) Edge hit (active polygon) → insert vertex & drag it.
    const e = findEdgeHit(p);
    if (e) {
      pushHistory();
      active().splice(e.edgeIndex + 1, 0, e.projection);
      setSelected(e.edgeIndex + 1);
      dragging = { kind: 'vertex', index: e.edgeIndex + 1 };
      render();
      return;
    }

    // 3) Inside the active polygon's body → drag whole active polygon.
    if (pointInPolygon(p, active())) {
      pushHistory();
      dragging = {
        kind: 'polygon',
        start: p,
        snapshot: active().map(([x, y]) => [x, y]),
      };
      return;
    }

    // 4) Inside an *inactive* polygon's body → switch active to it.
    const otherIdx = findInactivePolygonHit(p);
    if (otherIdx !== -1) {
      pushHistory();
      setActive(otherIdx);
      render();
      return;
    }

    // 5) Empty space → always append a new vertex to the active zone.
    //    (Selecting a previous point does NOT block drawing the next one.)
    pushHistory();
    active().push(p);
    setSelected(active().length - 1);
    dragging = { kind: 'vertex', index: active().length - 1 };
    render();
  });

  svg.addEventListener('pointermove', (evt) => {
    const p = clientToImage(evt);

    // Hover affordance: show 'move' cursor while inside any polygon body.
    if (!dragging) {
      const overActive = pointInPolygon(p, active());
      const overOther = !overActive && findInactivePolygonHit(p) !== -1;
      svg.style.cursor = (overActive || overOther) ? 'move' : 'default';
      return;
    }

    if (dragging.kind === 'vertex') {
      active()[dragging.index] = [
        Math.max(0, Math.min(IMG_W, p[0])),
        Math.max(0, Math.min(IMG_H, p[1])),
      ];
      render();
      return;
    }

    if (dragging.kind === 'polygon') {
      // Translate every vertex by (p - start), clamped so the bounding box
      // stays inside [0,IMG_W] × [0,IMG_H]. No vertex ever leaves the frame.
      const dx = p[0] - dragging.start[0];
      const dy = p[1] - dragging.start[1];
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const [x, y] of dragging.snapshot) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
      const cdx = Math.max(-minX, Math.min(IMG_W - maxX, dx));
      const cdy = Math.max(-minY, Math.min(IMG_H - maxY, dy));
      polygons[activeIndex] = dragging.snapshot.map(([x, y]) => [
        Math.round(x + cdx),
        Math.round(y + cdy),
      ]);
      render();
    }
  });
  svg.addEventListener('pointerup', () => { dragging = null; });
  svg.addEventListener('pointercancel', () => { dragging = null; });

  // Top-level click delegation — handles dock buttons + zone chips + zone deletes.
  root.addEventListener('click', (evt) => {
    // Zone delete (×) button — match before the chip handler.
    const zoneDel = evt.target.closest('[data-zone-delete]');
    if (zoneDel) {
      evt.stopPropagation();
      deleteZone(parseInt(zoneDel.dataset.zoneDelete, 10));
      return;
    }
    // Zone chip — switch active zone.
    const zoneChip = evt.target.closest('[data-zone]');
    if (zoneChip) {
      const i = parseInt(zoneChip.dataset.zone, 10);
      if (i !== activeIndex) {
        pushHistory();
        setActive(i);
        render();
      }
      return;
    }

    const btn = evt.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    if (action === 'rect') {
      pushHistory();
      const ix = IMG_W * 0.2, iy = IMG_H * 0.2;
      polygons[activeIndex] = [
        [Math.round(ix), Math.round(iy)],
        [Math.round(IMG_W - ix), Math.round(iy)],
        [Math.round(IMG_W - ix), Math.round(IMG_H - iy)],
        [Math.round(ix), Math.round(IMG_H - iy)],
      ];
      setSelected(null);
      render();
    } else if (action === 'clear') {
      pushHistory(); polygons[activeIndex] = []; setSelected(null); render();
    } else if (action === 'add-zone') {
      addZone();
    } else if (action === 'undo') {
      undo();
    } else if (action === 'delete-selected') {
      deleteSelected();
    } else if (action === 'deselect') {
      setSelected(null); render();
    } else if (action === 'cancel') {
      const hasContent = polygons.some(p => p.length > 0);
      if (hasContent && !confirm('Discard changes?')) return;
      polygons = [[]]; activeIndex = 0; setSelected(null); HISTORY.length = 0; render();
    } else if (action === 'save') {
      // Manager-API format: each polygon serialised as "x,y;x,y;..." —
      // matches manager-api/core/models/polygon_fields.py and the Manager UI
      // per-polygon text fields. Multi-polygon → array of those strings.
      const validPolys = polygons.filter(p => p.length >= 3);
      const managerFormat = validPolys.map(poly =>
        poly.map(([x, y]) => `${x},${y}`).join(';')
      );
      console.log('[Fast → Furious] PUT /api/v1/stores/{loc}/cameras/{uid}/polygons/', managerFormat);
      const body = managerFormat.length
        ? managerFormat.map((s, i) => `Polygon ${i + 1}: ${s}`).join('\n\n')
        : '(no valid polygons)';
      alert('Polygons to save (Manager format):\n\n' + body);
    }
  });

  render();
}

mount('phone');
</script>
</body>
</html>
